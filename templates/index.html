<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEx Query Assistant</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #3a4a8a;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 500;
  }
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .msg {
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
  }
  .msg.user .bubble {
    background: var(--accent-dim);
    border-radius: 16px 16px 4px 16px;
    padding: 12px 16px;
  }
  .msg.assistant {
    align-self: flex-start;
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    padding: 16px;
  }
  .routing-info {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .routing-chip {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .routing-chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .routing-chip .dot.high { background: var(--success); }
  .routing-chip .dot.med { background: var(--warning); }
  .routing-chip .dot.low { background: var(--error); }
  .query-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 12px 0;
  }
  .query-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .query-header span {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .query-header button {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .query-header button:hover {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent);
  }
  .query-body {
    padding: 12px;
    overflow-x: auto;
  }
  .query-body pre {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .explanation {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 8px;
  }
  .validation-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .validation-badge.valid {
    background: rgba(74, 222, 128, 0.15);
    color: var(--success);
  }
  .validation-badge.invalid {
    background: rgba(248, 113, 113, 0.15);
    color: var(--error);
  }
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-row textarea {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row textarea:focus {
    border-color: var(--accent);
  }
  .input-row textarea::placeholder {
    color: var(--text-muted);
  }
  .input-row button {
    height: 44px;
    padding: 0 20px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .input-row button:hover { opacity: 0.85; }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .loading .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .welcome {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 20px;
  }
  .welcome h2 {
    font-size: 22px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .welcome p { font-size: 14px; margin-bottom: 20px; }
  .sample-questions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
  }
  .sample-q {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .sample-q:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .meta-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 8px;
  }
</style>
</head>
<body>
<header>
  <h1>DEx Query Assistant</h1>
  <span class="badge">Prototype</span>
  <a href="/architecture" style="margin-left:auto;font-size:13px;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;border:1px solid var(--border);transition:all 0.15s;">Architecture</a>
</header>
<div class="main-area">
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Ask a question about your data</h2>
        <p>I'll route it to the right data product and generate a SQL or GraphQL query.</p>
        <div class="sample-questions">
          <button class="sample-q" onclick="askSample(this)">Show me all active bonds maturing in 2025</button>
          <button class="sample-q" onclick="askSample(this)">What is the latest closing price for instrument X?</button>
          <button class="sample-q" onclick="askSample(this)">List all active counterparties in APAC region</button>
          <button class="sample-q" onclick="askSample(this)">Show me all unsettled trades for this week</button>
          <button class="sample-q" onclick="askSample(this)">What are my top 10 positions by market value?</button>
          <button class="sample-q" onclick="askSample(this)">Which accounts are held at custodian JPMorgan?</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="questionInput" placeholder="Ask a question about your data..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuestion()}"
          oninput="autoResize(this)"></textarea>
        <button id="sendBtn" onclick="sendQuestion()">Generate</button>
      </div>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
let firstQuestion = true;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function askSample(btn) {
  inputEl.value = btn.textContent;
  sendQuestion();
}

function addUserMessage(text) {
  if (firstQuestion) {
    messagesEl.innerHTML = '';
    firstQuestion = false;
  }
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addLoadingMessage() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'loading-msg';
  div.innerHTML = `<div class="bubble"><div class="loading"><div class="spinner"></div>Routing question and generating query...</div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeLoadingMessage() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function addAssistantMessage(data) {
  removeLoadingMessage();
  const div = document.createElement('div');
  div.className = 'msg assistant';

  let routingHtml = '';
  if (data.routed_products && data.routed_products.length > 0) {
    routingHtml = '<div class="routing-info">';
    data.routed_products.forEach((p, i) => {
      const conf = p.confidence || 0;
      const dotClass = conf > 0.7 ? 'high' : conf > 0.4 ? 'med' : 'low';
      const selected = i === 0 ? ' style="border-color:var(--accent)"' : '';
      routingHtml += `<div class="routing-chip"${selected}><span class="dot ${dotClass}"></span>${p.product_name || p.product_id} (${(conf * 100).toFixed(0)}%)</div>`;
    });
    routingHtml += '</div>';
  }

  const validClass = data.validation?.valid ? 'valid' : 'invalid';
  const validText = data.validation?.valid ? 'Valid' : 'Has Issues';
  const validErrors = !data.validation?.valid && data.validation?.errors
    ? `<div class="explanation" style="color:var(--error)">${data.validation.errors.join('<br>')}</div>`
    : '';

  const queryLang = (data.query_type || 'sql').toUpperCase();
  const queryId = 'q-' + Date.now();

  let html = `<div class="bubble">
    ${routingHtml}
    <div class="query-block">
      <div class="query-header">
        <span>${queryLang}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="validation-badge ${validClass}">${validText}</span>
          <button onclick="copyQuery('${queryId}')">Copy</button>
        </div>
      </div>
      <div class="query-body"><pre id="${queryId}">${escapeHtml(data.query || 'No query generated')}</pre></div>
    </div>
    ${validErrors}`;

  if (data.explanation) {
    const cleanExplanation = data.explanation.replace(/```[\s\S]*?```/g, '').trim();
    if (cleanExplanation) {
      html += `<div class="explanation">${escapeHtml(cleanExplanation)}</div>`;
    }
  }

  if (data.attempts > 1) {
    html += `<div class="meta-row"><span class="validation-badge" style="background:var(--surface2);color:var(--text-muted)">Attempts: ${data.attempts}</span></div>`;
  }

  html += '</div>';
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addErrorMessage(text) {
  removeLoadingMessage();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="bubble"><div style="color:var(--error)">${escapeHtml(text)}</div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendQuestion() {
  const question = inputEl.value.trim();
  if (!question) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addUserMessage(question);
  addLoadingMessage();

  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await resp.json();
    if (data.error) {
      addErrorMessage(data.error);
    } else {
      addAssistantMessage(data);
    }
  } catch (err) {
    addErrorMessage(`Request failed: ${err.message}`);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function copyQuery(id) {
  const el = document.getElementById(id);
  if (el) {
    navigator.clipboard.writeText(el.textContent);
    const btn = el.closest('.query-block').querySelector('button');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  }
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

inputEl.focus();
</script>
</body>
</html>
